name: NPM Integration Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: integration-npm-${{ github.ref }}
  cancel-in-progress: true

env:
  CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-token: ${{ steps.check.outputs.has-token }}
    steps:
      - id: check
        run: echo "has-token=${{ secrets.CS_ACCESS_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

  npm-integration-linux:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-token == 'true'
    runs-on: ubuntu-22.04
    name: NPM Integration Tests (Linux)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run NPM integration tests
        run: ./tests/run-integration-tests.sh --npm
