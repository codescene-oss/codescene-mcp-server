name: E2E Tests (Static)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: e2e-static-${{ github.ref }}
  cancel-in-progress: true

env:
  CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-token: ${{ steps.check.outputs.has-token }}
    steps:
      - id: check
        run: echo "has-token=${{ secrets.CS_ACCESS_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

  # =============================================================================
  # E2E Tests - Linux
  # =============================================================================
  e2e-linux:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-token == 'true'
    runs-on: ubuntu-22.04
    name: E2E Static (Linux)
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Run e2e tests (static backend)
        run: CS_MCP_BACKEND=static cargo test --test e2e --release -- --test-threads=4

  # =============================================================================
  # E2E Tests - macOS (Apple Silicon)
  # =============================================================================
  e2e-macos:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-token == 'true'
    runs-on: macos-latest
    name: E2E Static (macOS)
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run e2e tests (static backend)
        run: CS_MCP_BACKEND=static cargo test --test e2e --release -- --test-threads=4

  # =============================================================================
  # E2E Tests - Windows
  # =============================================================================
  e2e-windows:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-token == 'true'
    runs-on: x64-windows-8core
    name: E2E Static (Windows)
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run e2e tests (static backend)
        shell: pwsh
        run: |
          $env:CS_MCP_BACKEND = "static"
          cargo test --test e2e --release -- --test-threads=4
