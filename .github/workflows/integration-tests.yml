name: Integration Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-token: ${{ steps.check.outputs.has-token }}
    steps:
      - id: check
        run: echo "has-token=${{ secrets.CS_ACCESS_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

  # =============================================================================
  # Comprehensive Integration Tests - Linux
  # =============================================================================
  integration-linux:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-token == 'true'
    runs-on: ubuntu-22.04
    name: Integration Tests (Linux)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Run comprehensive integration tests
        run: ./tests/run-integration-tests.sh

  # =============================================================================
  # Comprehensive Integration Tests - macOS (Apple Silicon)
  # =============================================================================
  integration-macos:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-token == 'true'
    runs-on: macos-latest
    name: Integration Tests (macOS)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run comprehensive integration tests
        run: ./tests/run-integration-tests.sh

  # =============================================================================
  # Comprehensive Integration Tests - Windows
  # =============================================================================
  integration-windows:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-token == 'true'
    runs-on: x64-windows-8core
    name: Integration Tests (Windows)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run comprehensive integration tests
        shell: pwsh
        run: .\tests\run-integration-tests.ps1
