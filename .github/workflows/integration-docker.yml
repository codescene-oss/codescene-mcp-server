name: Docker Integration Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: integration-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-token: ${{ steps.check.outputs.has-token }}
    steps:
      - id: check
        run: echo "has-token=${{ secrets.CS_ACCESS_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

  # =============================================================================
  # Docker Integration Tests - Linux
  # =============================================================================
  # Note: Docker tests only run on Linux because:
  # - macOS GitHub runners don't have native Docker; Colima/VZ is unreliable
  # - Linux Docker tests provide sufficient coverage for the Docker backend
  # - Static tests still run on macOS to validate core functionality
  docker-integration-linux:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-token == 'true'
    runs-on: ubuntu-22.04
    name: Docker Integration Tests (Linux)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Build Docker image
        run: docker build --build-arg VERSION=MCP-0.0.0-test -t codescene-mcp-test .

      - name: Run Docker integration tests
        run: ./tests/run-integration-tests.sh --docker
