name: Publish npm Package

on:
  workflow_run:
    workflows: ["Build and publish executables"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.2.3). Leave empty to use latest release tag."
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run (skip actual npm publish)"
        required: false
        default: "false"
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'MCP-'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Get release version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "Publishing manually specified version: $VERSION"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=$(gh release view --json tagName --jq '.tagName')
            VERSION="${TAG#MCP-}"
            echo "Publishing version: $VERSION (from latest release tag: $TAG)"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
            VERSION="${TAG#MCP-}"
            echo "Publishing version: $VERSION (from workflow_run tag: $TAG)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set package version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version
        working-directory: npm

      - name: Publish to npm
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Dry run — skipping publish"
            npm pack --dry-run
          else
            npm publish --access public
          fi
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
