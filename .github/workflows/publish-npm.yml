name: Publish npm Package

on:
  workflow_run:
    workflows: ["Build and publish executables"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual npm publish)"
        required: false
        default: "false"
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'MCP-'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Get release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=$(gh release view --json tagName --jq '.tagName')
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          VERSION="${TAG#MCP-}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION (from tag: $TAG)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set package version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version
        working-directory: npm

      - name: Publish to npm
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Dry run — skipping publish"
            npm pack --dry-run
          else
            npm publish --access public
          fi
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
