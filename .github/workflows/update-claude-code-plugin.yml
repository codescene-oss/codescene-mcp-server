name: Update Claude Code plugin

on:
  workflow_run:
    workflows: ["Build and publish executables"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to process (e.g., MCP-1.1.6)"
        required: true
        type: string

jobs:
  update-versions:
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'MCP-')) || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.tag, 'MCP-')) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Get release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${{ github.event.workflow_run.head_branch }}"
          fi
          VERSION="${VERSION#MCP-}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version in manifest and plugin files
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          python3 - <<PY
          import json
          from pathlib import Path

          version = "$VERSION"

          for path in [
            Path("manifest.json"),
            Path("claude-code-plugin/.claude-plugin/plugin.json"),
          ]:
            if path.exists():
              data = json.loads(path.read_text())
              data["version"] = version
              path.write_text(json.dumps(data, indent=2) + "\n")
              print(f"Updated {path} to {version}")
          PY

      - name: Sync skills to Claude Code plugin
        run: |
          rm -rf claude-code-plugin/skills
          cp -r skills claude-code-plugin/skills
          echo "Synced skills/ to claude-code-plugin/skills/"

      - name: Update skills table in README
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          rows = ["| Skill | Description |", "|-------|-------------|"]
          for skill_dir in sorted(Path("skills").iterdir()):
              skill_file = skill_dir / "SKILL.md"
              if not skill_file.is_file():
                  continue
              name = skill_dir.name
              text = skill_file.read_text()
              match = re.search(r"^description:\s*(.+)$", text, re.MULTILINE)
              desc = match.group(1).strip() if match else ""
              rows.append(f"| `/codescene:{name}` | {desc} |")

          table = "\n".join(rows) + "\n"
          readme = Path("claude-code-plugin/README.md")
          content = readme.read_text()
          content = re.sub(
              r"<!-- SKILLS-TABLE:START -->\n.*?<!-- SKILLS-TABLE:END -->",
              f"<!-- SKILLS-TABLE:START -->\n{table}<!-- SKILLS-TABLE:END -->",
              content,
              flags=re.DOTALL,
          )
          readme.write_text(content)
          print("Updated skills table in README")
          PY

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "chore: update Claude Code plugin to ${{ steps.version.outputs.version }}"
          title: "Update Claude Code plugin to ${{ steps.version.outputs.version }}"
          body: |
            This PR updates the Claude Code plugin to version ${{ steps.version.outputs.version }}:
            - Version strings in `manifest.json` and `plugin.json`
            - Skills synced from `skills/`
            - README skills table regenerated
          branch: update-claude-code-plugin-${{ steps.version.outputs.version }}
          delete-branch: true
