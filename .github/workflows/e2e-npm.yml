name: E2E Tests (NPM)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: e2e-npm-${{ github.ref }}
  cancel-in-progress: true

env:
  CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-token: ${{ steps.check.outputs.has-token }}
    steps:
      - id: check
        run: echo "has-token=${{ secrets.CS_ACCESS_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

  e2e-npm-linux:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-token == 'true'
    runs-on: ubuntu-22.04
    name: E2E NPM (Linux)
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run e2e tests (npm backend)
        run: CS_MCP_BACKEND=npm cargo test --test e2e --release -- --test-threads=4
