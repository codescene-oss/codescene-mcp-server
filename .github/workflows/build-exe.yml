  publish-to-release:
    if: github.event_name == 'push'
    permissions:
      contents: write 
    needs: [build-exe-unix, build-exe-windows-amd64, build-rust-unix, build-rust-windows-amd64]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-binaries
          merge-multiple: true

      - name: Upload to Existing Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ./all-binaries/*
          append_body: true
