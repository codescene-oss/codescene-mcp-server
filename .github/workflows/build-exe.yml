name: Build and publish executables

on: 
  # pull_request:
  #   branches:
  #     - main
  workflow_dispatch:
    inputs:
      variant:
        description: "Which executable variant to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - linux-amd64
          - linux-aarch64
          - macos-amd64
          - macos-aarch64
          - windows-amd64
      upload_binaries:
        description: "Upload build artifacts (disable for dry test runs)"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - 'MCP-[0-9]+.[0-9]+.[0-9]+'
      - 'MCP-[0-9]+.[0-9]+.[0-9]+-*'
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-exe-unix:
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            arch: amd64
            variant: linux-amd64
            rust-target: x86_64-unknown-linux-musl
            artifact-name: cs-mcp-linux-amd64
          - os: ubuntu-22.04-arm
            arch: aarch64
            variant: linux-aarch64
            rust-target: aarch64-unknown-linux-musl
            artifact-name: cs-mcp-linux-aarch64
          - os: macos-14-large
            arch: amd64
            variant: macos-amd64
            rust-target: x86_64-apple-darwin
            artifact-name: cs-mcp-macos-amd64
          - os: macos-latest
            arch: aarch64
            variant: macos-aarch64
            rust-target: aarch64-apple-darwin
            artifact-name: cs-mcp-macos-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install musl toolchain (Linux)
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build Linux binary (musl static)
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'ubuntu')
        run: cargo build --release --locked --target "${{ matrix.rust-target }}"

      - name: Build macOS binary
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'macos')
        run: cargo build --release --locked

      - name: Copy and rename Linux binary
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          cp "target/${{ matrix.rust-target }}/release/cs-mcp" "${{ matrix.artifact-name }}"
          chmod +x "${{ matrix.artifact-name }}"

      - name: Copy and rename macOS binary
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          cp target/release/cs-mcp "${{ matrix.artifact-name }}"
          chmod +x "${{ matrix.artifact-name }}"

      - name: Verify Linux binary is static (musl)
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          BIN="${{ matrix.artifact-name }}"
          file "$BIN"
          LDD_OUTPUT="$(ldd "$BIN" 2>&1 || true)"
          if echo "$LDD_OUTPUT" | grep -Eqi "statically linked|not a dynamic executable|not a valid dynamic"; then
            echo "Verified static musl binary: $BIN"
          else
            echo "::error::Expected a static musl binary, but '$BIN' appears to be dynamically linked"
            echo "$LDD_OUTPUT"
            exit 1
          fi

      - name: Verify Linux executable (optional)
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          BIN="${{ matrix.artifact-name }}"
          chmod +x "$BIN" || true
          ./"$BIN" --help >/dev/null 2>&1 || true

      - name: Generate checksum (Linux)
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          BIN="${{ matrix.artifact-name }}"
          sha256sum "$BIN" > "${BIN}.sha256"

      - name: Check for Linux signing secrets
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'ubuntu')
        id: check-linux-secrets
        shell: bash
        run: |
          if [[ -n "${{ secrets.LINUX_GPG_PRIVATE_KEY }}" \
             && -n "${{ secrets.LINUX_GPG_KEY_ID }}" \
             && -n "${{ secrets.LINUX_GPG_PASSPHRASE }}" ]]; then
            echo "can-sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "can-sign=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG key (Linux)
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'ubuntu') && steps.check-linux-secrets.outputs.can-sign == 'true'
        shell: bash
        env:
          LINUX_GPG_PRIVATE_KEY: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
        run: |
          echo "$LINUX_GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Sign checksum (Linux)
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'ubuntu') && steps.check-linux-secrets.outputs.can-sign == 'true'
        shell: bash
        env:
          LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}
          LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
        run: |
          BIN="${{ matrix.artifact-name }}"
          gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$LINUX_GPG_PASSPHRASE" \
              --local-user "$LINUX_GPG_KEY_ID" \
              --armor \
              --output "${BIN}.sha256.asc" \
              --sign "${BIN}.sha256"

      - name: Check for macOS signing secrets
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'macos')
        id: check-mac-secrets
        shell: bash
        run: |
          if [[ -n "${{ secrets.MACOS_CERTIFICATE }}" \
             && -n "${{ secrets.MACOS_CERTIFICATE_PWD }}" \
             && -n "${{ secrets.APPLE_DEVELOPER_ID }}" \
             && -n "${{ secrets.APPLE_ID }}" \
             && -n "${{ secrets.APPLE_APP_PASSWORD }}" \
             && -n "${{ secrets.APPLE_TEAM_ID }}" ]]; then
            echo "can-sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "can-sign=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple Developer Certificate (keychain)
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'macos') && steps.check-mac-secrets.outputs.can-sign == 'true'
        shell: bash
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: keychainpassword
        run: |
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          printf '%s' "$MACOS_CERTIFICATE" | base64 -D -o certificate.p12

          if [[ ! -s certificate.p12 ]]; then
            echo "::error::Failed to decode certificate - file is empty or missing"
            exit 1
          fi

          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain
          rm -f certificate.p12

      - name: Codesign macOS executable
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'macos') && steps.check-mac-secrets.outputs.can-sign == 'true'
        shell: bash
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          BIN="${{ matrix.artifact-name }}"
          if [[ ! -f "$BIN" ]]; then
            echo "::error::Expected macOS binary at '$BIN' but it was not found."
            ls -la
            exit 1
          fi

          codesign --force --options runtime --sign "$APPLE_DEVELOPER_ID" --timestamp "$BIN"
          codesign --verify --verbose "$BIN"

      - name: Notarize macOS executable
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'macos') && steps.check-mac-secrets.outputs.can-sign == 'true'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BIN="${{ matrix.artifact-name }}"
          ZIP="notarize-${{ matrix.arch }}.zip"

          ditto -c -k --keepParent "$BIN" "$ZIP"
          xcrun notarytool submit "$ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'macos') && steps.check-mac-secrets.outputs.can-sign == 'true'
        shell: bash
        run: |
          echo "::notice::Skipping staple for standalone executable (not supported by Apple)"
          echo "Notarization is valid - Gatekeeper will verify online"

      - name: Clean up keychain
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'macos') && steps.check-mac-secrets.outputs.can-sign == 'true' && always()
        shell: bash
        run: |
          security default-keychain -s login.keychain
          security delete-keychain build.keychain || true
          rm -f notarize-*.zip || true

      - name: Set executable permissions and zip (macOS)
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          chmod +x "${{ matrix.artifact-name }}"
          zip "${{ matrix.artifact-name }}.zip" "${{ matrix.artifact-name }}"

      - name: Zip binary with checksums (Linux)
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          BIN="${{ matrix.artifact-name }}"
          chmod +x "$BIN"
          zip "${BIN}.zip" "$BIN" ${BIN}.sha256 ${BIN}.sha256.asc 2>/dev/null || zip "${BIN}.zip" "$BIN" ${BIN}.sha256 2>/dev/null || zip "${BIN}.zip" "$BIN"

      - name: Upload Executable Artifact (zipped binary)
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant) && (github.event_name == 'push' || inputs.upload_binaries)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}.zip

  build-exe-windows-amd64:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.variant == 'all' || github.event.inputs.variant == 'windows-amd64'
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build executable
        run: cargo build --release --locked

      - name: Rename binary to include platform info
        run: Copy-Item -Path "target\release\cs-mcp.exe" -Destination "cs-mcp-windows-amd64.exe"

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign binary with Azure Trusted Signing (OIDC)
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          files: |
            ${{ github.workspace }}\cs-mcp-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload Executable Artifact
        if: github.event_name == 'push' || inputs.upload_binaries
        uses: actions/upload-artifact@v4
        with:
          name: cs-mcp-windows-amd64
          path: cs-mcp-windows-amd64.exe

  publish-to-release:
    if: github.event_name == 'push'
    permissions:
      contents: write 
    needs: [build-exe-unix, build-exe-windows-amd64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install MCPB CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-binaries
          merge-multiple: true

      - name: Build cross-platform MCPB bundle
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          STAGING_DIR="./mcpb-staging"
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR/bin/darwin" "$STAGING_DIR/bin/linux" "$STAGING_DIR/bin/win32"

          unzip -q "./all-binaries/cs-mcp-macos-amd64.zip" -d "$STAGING_DIR/bin/darwin"
          mv "$STAGING_DIR/bin/darwin/cs-mcp-macos-amd64" "$STAGING_DIR/bin/darwin/cs-mcp-amd64"

          unzip -q "./all-binaries/cs-mcp-macos-aarch64.zip" -d "$STAGING_DIR/bin/darwin"
          mv "$STAGING_DIR/bin/darwin/cs-mcp-macos-aarch64" "$STAGING_DIR/bin/darwin/cs-mcp-aarch64"

          unzip -q "./all-binaries/cs-mcp-linux-amd64.zip" -d "$STAGING_DIR/bin/linux"
          mv "$STAGING_DIR/bin/linux/cs-mcp-linux-amd64" "$STAGING_DIR/bin/linux/cs-mcp-amd64"

          unzip -q "./all-binaries/cs-mcp-linux-aarch64.zip" -d "$STAGING_DIR/bin/linux"
          mv "$STAGING_DIR/bin/linux/cs-mcp-linux-aarch64" "$STAGING_DIR/bin/linux/cs-mcp-aarch64"

          cp "./all-binaries/cs-mcp-windows-amd64.exe" "$STAGING_DIR/bin/win32/cs-mcp.exe"

          cat > "$STAGING_DIR/bin/darwin/cs-mcp" <<'EOF'
          #!/usr/bin/env sh
          set -eu
          arch="$(uname -m)"
          case "$arch" in
            arm64|aarch64)
              exec "$(dirname "$0")/cs-mcp-aarch64" "$@"
              ;;
            x86_64|amd64)
              exec "$(dirname "$0")/cs-mcp-amd64" "$@"
              ;;
            *)
              echo "Unsupported macOS architecture: $arch" >&2
              exit 1
              ;;
          esac
          EOF

          cat > "$STAGING_DIR/bin/linux/cs-mcp" <<'EOF'
          #!/usr/bin/env sh
          set -eu
          arch="$(uname -m)"
          case "$arch" in
            arm64|aarch64)
              exec "$(dirname "$0")/cs-mcp-aarch64" "$@"
              ;;
            x86_64|amd64)
              exec "$(dirname "$0")/cs-mcp-amd64" "$@"
              ;;
            *)
              echo "Unsupported Linux architecture: $arch" >&2
              exit 1
              ;;
          esac
          EOF

          chmod +x "$STAGING_DIR/bin/darwin/cs-mcp" "$STAGING_DIR/bin/linux/cs-mcp"
          chmod +x "$STAGING_DIR/bin/darwin/cs-mcp-aarch64" "$STAGING_DIR/bin/darwin/cs-mcp-amd64"
          chmod +x "$STAGING_DIR/bin/linux/cs-mcp-aarch64" "$STAGING_DIR/bin/linux/cs-mcp-amd64"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          source = Path("manifest.json")
          target = Path("mcpb-staging/manifest.json")

          manifest = json.loads(source.read_text())
          manifest["manifest_version"] = "0.3"
          tag = os.environ.get("RELEASE_TAG", "")
          if tag.startswith("MCP-"):
            manifest["version"] = tag[len("MCP-"):]
          manifest["server"] = {
            "type": "binary",
            "entry_point": "bin/darwin/cs-mcp",
            "mcp_config": {
              "command": "${__dirname}/bin/darwin/cs-mcp",
              "args": [],
              "env": {},
              "platform_overrides": {
                "linux": {
                  "command": "${__dirname}/bin/linux/cs-mcp"
                },
                "win32": {
                  "command": "${__dirname}/bin/win32/cs-mcp.exe"
                }
              }
            }
          }
          manifest["compatibility"] = {
            "platforms": ["darwin", "linux", "win32"]
          }

          target.write_text(json.dumps(manifest, indent=2) + "\n")
          PY

          mcpb pack "$STAGING_DIR" "./all-binaries/codehealth-mcp-${{ github.ref_name }}.mcpb"

      - name: Upload MCPB artifact
        uses: actions/upload-artifact@v4
        with:
          name: codehealth-mcp-mcpb
          path: ./all-binaries/codehealth-mcp-${{ github.ref_name }}.mcpb

      - name: Upload to Existing Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ./all-binaries/*
          append_body: true
